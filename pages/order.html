<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanti EMart - Coming Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --charcoal:    #00000098;
            --green:       #00A650;
            --green-l:     #00C060;
            --red:         #E8001D;
            --cream:       #F4FFF8;
            --cream-hover: #e3ffef;
            --ink:         #111111;
            --muted:       #5A6B5A;
            --card:        #FFFFFF;
            --border:      #D6EFE0;
            --radius:      14px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background: var(--cream);
            font-family: 'DM Sans', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* background blobs */
        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            background: var(--green-l);
            opacity: 0.07;
            pointer-events: none;
        }
        body::before { width: 480px; height: 480px; top: -140px; right: -140px; }
        body::after  { width: 300px; height: 300px; bottom: -100px; left: -100px; }

        .container {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 20px;
            width: 100%;
        }

        .coming-soon {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 52px 44px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 6px 40px rgba(0, 166, 80, 0.07);
        }

        /* status pill */
        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            background: var(--cream);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 6px 16px;
            margin-bottom: 32px;
        }
        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--green);
            animation: blink 1.8s ease-in-out infinite;
        }
        .status-pill span {
            font-size: 12px;
            font-weight: 600;
            color: var(--green);
            letter-spacing: 0.6px;
            text-transform: uppercase;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.4; transform: scale(0.8); }
        }

        /* header */
        .header h3 {
            font-family: 'Pacifico', cursive;
            font-size: 40px;
            color: var(--ink);
            line-height: 1.2;
            margin-bottom: 8px;
        }
        .header h3 em {
            font-style: normal;
            color: var(--green);
        }
        .header > p {
            font-size: 13px;
            color: var(--muted);
            letter-spacing: 0.3px;
        }

        .divider {
            width: 36px;
            height: 3px;
            background: var(--green);
            border-radius: 99px;
            margin: 24px auto;
        }

        /* body text */
        .body p {
            font-size: 15px;
            color: var(--muted);
            line-height: 1.75;
        }

        /* notify row */
        .notify {
            margin-top: 36px;
            display: flex;
            gap: 8px;
        }
        .notify input {
            flex: 1;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px 16px;
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            color: var(--ink);
            background: var(--cream);
            outline: none;
            transition: border-color 0.2s;
            min-width: 0; /* prevents flex overflow */
        }
        .notify input:focus { border-color: var(--green); background: var(--cream-hover); }
        .notify input::placeholder { color: var(--muted); opacity: 0.7; }
        .notify button {
            background: var(--green);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            padding: 12px 22px;
            font-size: 14px;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s, transform 0.1s;
            flex-shrink: 0;
        }
        .notify button:hover  { background: var(--green-l); }
        .notify button:active { transform: scale(0.97); }

        .footer-note {
            font-size: 12px;
            color: var(--muted);
            margin-top: 12px;
            opacity: 0.65;
        }

        /* ── Responsive ── */

        /* Tablet: ≤ 600px */
        @media (max-width: 600px) {
            body::before { width: 320px; height: 320px; top: -100px; right: -100px; }
            body::after  { width: 200px; height: 200px; bottom: -70px; left: -70px; }

            .container { padding: 24px 16px; }

            .coming-soon {
                padding: 40px 28px;
                border-radius: 20px;
            }

            .header h3 { font-size: 34px; }
        }

        /* Mobile: ≤ 420px */
        @media (max-width: 420px) {
            .coming-soon {
                padding: 32px 20px;
                border-radius: 18px;
            }

            .header h3 { font-size: 28px; }

            .header > p { font-size: 12px; }

            .body p { font-size: 14px; }

            /* Stack input + button vertically on small screens */
            .notify {
                flex-direction: column;
                gap: 10px;
                margin-top: 28px;
            }
            .notify input,
            .notify button {
                width: 100%;
                padding: 13px 16px;
                text-align: center;
            }

            .status-pill { margin-bottom: 24px; }
        }

        /* Very small: ≤ 320px */
        @media (max-width: 320px) {
            .coming-soon { padding: 28px 16px; }
            .header h3   { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="coming-soon">

            <div class="status-pill">
                <div class="status-dot"></div>
                <span>Coming Soon</span>
            </div>

            <div class="header">
                <h3>Kanti <em>EMart</em></h3>
                <p>Your convenient digital mart</p>
            </div>

            <div class="divider"></div>

            <div class="body">
                <p>Your convenient digital mart is coming soon — we are working hard to make it as convenient as possible.</p>
            </div>

            <div class="notify">
                <input type="email" placeholder="Enter your email" />
                <button>Notify me</button>
            </div>
            <p class="footer-note">No spam. We'll only reach out when we're live.</p>

        </div>
    </div>
</body>
</html>
