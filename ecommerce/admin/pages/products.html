<div class="products">
    <div class="top">
        <h1 class="head">Products</h1>
        <p class="sub-head">Manage your product inventory</p>
    </div>
    <div class="products-toolbar">
        <div class="orders-search">
            <i class="hgi hgi-stroke hgi-search-01"></i>
            <input type="text" placeholder="Search products...">
        </div>
        <button class="btn btn-primary" id="addProducts"><i class="hgi hgi-stroke hgi-plus-sign"></i> Add Product</button>
    </div>
    <div class="products-grid">
        <p class="grid-loading">Loading products...</p>
    </div>
        </div>
    <div class="add-product-overlay hide">
        <div class="add-product">
            <div class="add-product-head">
                <h3>Add Product</h3>
                <button class="add-product-close close">&times;</button>
            </div>
            <div class="inputs">
                <form class="newProduct">
                    <div class="form-group">
                        <label>Product Image</label>
                        <div class="file-upload" id="fileUploadArea">
                            <i class="hgi hgi-stroke hgi-image-upload"></i>
                            <p class="file-upload-text">Click to select an image</p>
                            <p class="file-upload-sub">Supports: JPG, PNG, WEBP</p>
                            <input type="file" name="image" id="productImage" accept="image/*" required>
                        </div>
                        <span class="file-name" id="fileName">No file chosen</span>
                    </div>
                    <div class="form-group">
                        <label>Product Name</label>
                        <input type="text" name="name" class="product-name" placeholder="e.g. Wireless Headphones" required>
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select name="categories" id="categories" required>
                            <option value="" disabled selected>Select a category</option>
                            <option value="1">Household</option>
                            <option value="2">Cosmetics</option>
                            <option value="3">Babies Corners</option>
                            <option value="4">Perfumery</option>
                            <option value="5">Food/Drinks</option>
                            <option value="6">Snacks</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Price (₦)</label>
                            <input type="number" name="price" class="price" placeholder="0.00" min="0" step="0.01" required>
                        </div>
                        <div class="form-group">
                            <label>Stock (units)</label>
                            <input type="number" name="stock" placeholder="0" min="0" required class="quantity">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Product Weight</label>
                        <input type="text" name="weight" class="weight" placeholder="e.g. 70g (optional)">
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea name="description" class="description" placeholder="Brief product description... (optional)"></textarea>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn add-product-cancel close">Cancel</button>
                        <button type="submit" class="btn btn-primary">Add Product</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <div class="add-product-overlay hide" id="editProductOverlay">
    <div class="add-product">
        <div class="add-product-head">
            <h3>Edit Product</h3>
            <button class="add-product-close close" id="closeEditProduct">&times;</button>
        </div>
        <div class="inputs">
            <form class="editProduct" id="editProductForm">
                <input type="hidden" id="editProductId">
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="editName" placeholder="Product name">
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="editCategory">
                            <option value="" disabled selected>Select a category</option>
                            <option value="1">Household</option>
                            <option value="2">Cosmetics</option>
                            <option value="3">Babies Corners</option>
                            <option value="4">Perfumery</option>
                            <option value="5">Food/Drinks</option>
                            <option value="6">Snacks</option>
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Price ($)</label>
                        <input type="number" id="editPrice" min="0" step="0.01">
                    </div>
                    <div class="form-group">
                        <label>Stock (units)</label>
                        <input type="number" id="editStock" min="0">
                    </div>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="editDescription"></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn close" id="cancelEditProduct">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</div>
