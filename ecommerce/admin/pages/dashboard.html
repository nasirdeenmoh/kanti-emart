<div class="dashboard">
    <div class="top">
        <h1 class="head">Welcome Back, Admin</h1>
        <p class="sub-head">Here's what's happening with your store today</p>
    </div>
    <div class="stats">
        <div class="stat-card">
            <span class="icon"><i class="hgi hgi-stroke hgi-money-01"></i></span>
            <span class="revenue" id="revenue">0</span>
            <span class="sub-text">Total Revenue</p>
        </div>
        <div class="stat-card">
            <span class="icon"><i class="hgi hgi-stroke hgi-shopping-cart-check-out-02"></i></span>
            <span class="revenue" id="orders">0</span>
            <span class="sub-text">Total Orders</p>
        </div>
        <div class="stat-card">
            <span class="icon"><i class="hgi hgi-stroke hgi-user-multiple-02"></i></span>
            <span class="revenue" id="customers">0</span>
            <span class="sub-text">Total Customers</p>
        </div>
    </div>
    <div class="multi-card">
        <div class="card">
            <div class="head">
                <h1 class="head">Recent Orders</h1>
            </div>
            <div class="body orders-body">
                <p class="grid-loading">Loading Recent Orders.</p>
            </div>
        </div>
    </div>
</div>
