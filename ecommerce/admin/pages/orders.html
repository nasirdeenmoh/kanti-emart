<div class="orders">
    <div class="top">
        <h1 class="head">Orders</h1>
        <p class="sub-head">Manage and track customer orders</p>
    </div>
    <div class="orders-toolbar">
        <div class="orders-search">
            <i class="hgi hgi-stroke hgi-search-01"></i>
            <input type="text" placeholder="Search orders...">
        </div>
        <!-- <button class="btn"><i class="hgi hgi-stroke hgi-filter"></i> Filter</button> -->
        <!-- <button class="btn btn-primary"><i class="hgi hgi-stroke hgi-download-02"></i> Export</button> -->
    </div>
    <div class="orders-table-wrap">
        <table class="orders-table">
            <thead>
                <tr>
                    <th>Order ID</th>
                    <th>Customer Id</th>
                    <th>Date</th>
                    <th>Items</th>
                    <th>Amount</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody class="orders-container">
                <tr><td colspan="6" class="table-loading">Loading orders...</td></tr>
            </tbody>
        </table>
    </div>
</div>
