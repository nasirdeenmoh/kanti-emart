<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Kanti Emart</title>
    <link rel="stylesheet" href="https://cdn.hugeicons.com/font/hgi-stroke-rounded.css" />
    <link rel="stylesheet" href="styles/admin.css">
</head>
<body>
    <div class="container">
        <div class="nav-panel">
            <h1 class="head">Kanti Plus Admin</h1>
            <div class="navs">
                <li data-page="dashboard" class="nav active"><i class="hgi hgi-stroke hgi-dashboard-square-02"></i> <p>Dashboard</p></li>
                <li data-page="orders" class="nav"><i class="hgi hgi-stroke hgi-shopping-cart-check-out-02"></i> <p>Orders</p></li>
                <li data-page="products" class="nav"><i class="hgi hgi-stroke hgi-codesandbox"></i> <p>Products</p></li>
                <li data-page="customers" class="nav"><i class="hgi hgi-stroke hgi-user-multiple-02"></i> <p>Customers</p></li>
                <!-- <li data-page="analytics" class="nav"><i class="hgi hgi-stroke hgi-trade-up"></i> <p>Analytics</p></li> -->
            </div>
            <div class="user-profile">
                <span class="profile"></span>
                <div class="group">
                    <span class="name"></span>
                    <span class="role"></span>
                </div>
            </div>
        </div>
        <div class="content">
            
        </div>
        <div class="loading-overlay"></div>
    </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="scripts/admin.js" type="module"></script>
</html>
