<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../styles/basicStyles.css">
    <title>Checktout Success - Kanti Plus</title>
    <style>
        body {
            background-color: var(--cream);
            color: var(--ink);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .success-card {
            background: var(--card);
            padding: 40px;
            border-radius: var(--radius);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            text-align: center;
            max-width: 450px;
            width: 90%;
            border: 1px solid var(--border);
        }

        .success-icon {
            font-size: 4rem;
            color: var(--green);
            margin-bottom: 20px;
        }

        .success-title {
            font-family: 'Jost', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--ink);
            margin-bottom: 12px;
        }

        .success-msg {
            font-size: 1rem;
            color: var(--muted);
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .ref-box {
            background-color: var(--background);
            border: 1px dashed var(--border);
            padding: 16px;
            border-radius: var(--radius);
            margin-bottom: 30px;
        }

        .ref-label {
            font-size: 0.85rem;
            color: var(--muted);
            margin-bottom: 4px;
            display: block;
        }

        .ref-number {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--green);
            font-family: monospace;
        }

        .btn-home {
            background-color: var(--green);
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: var(--radius);
            font-weight: 600;
            display: inline-block;
            transition: background 0.2s;
        }

        .btn-home:hover {
            background-color: var(--green-l);
        }
    </style>
</head>

<body>
    <div class="success-card">
        <div class="success-icon">
            <i class="fa-solid fa-circle-check"></i>
        </div>
        <h1 class="success-title">Payment Successful!</h1>
        <p class="success-msg">Thank you for your purchase. Your order has been placed successfully and stock has been updated.</p>
        
        <div class="ref-box">
            <span class="ref-label">Transaction Reference</span>
            <span class="ref-number" id="txRef">Loading...</span>
        </div>

        <a href="index.html" class="btn-home">Return to Store</a>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            const ref = urlParams.get('ref');
            
            if (ref) {
                document.getElementById('txRef').textContent = ref;
            } else {
                document.getElementById('txRef').textContent = 'N/A';
            }
        });
    </script>
</body>

</html>
